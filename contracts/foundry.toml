[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
bytecode_hash = "none"
cbor_metadata = false
via_ir = false
fs_permissions = [{ access = "read-write", path = "./deployments" }]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[invariant]
runs = 32
depth = 32

[rpc_endpoints]
hashkey_testnet = "${HASHKEY_TESTNET_RPC}"
hashkey_mainnet = "${HASHKEY_MAINNET_RPC}"

[etherscan]
hashkey_testnet = { key = "${HASHKEY_EXPLORER_API_KEY}", url = "${HASHKEY_TESTNET_EXPLORER_API}" }
